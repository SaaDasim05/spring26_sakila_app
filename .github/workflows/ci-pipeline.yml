name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: python -m pip install --upgrade pip flake8

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=venv,__pycache__,sakila-db

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      PYTHONPATH: .
      MYSQL_HOST: localhost
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: sakila
      DB_HOST: localhost
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: sakila
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Download Sakila SQL files
        run: |
          curl -L -o sakila-db.tar.gz https://downloads.mysql.com/docs/sakila-db.tar.gz
          mkdir -p sakila-db
          tar -xzf sakila-db.tar.gz -C sakila-db --strip-components=1

      - name: Wait for MySQL service to be healthy
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h "$MYSQL_HOST" -P "$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --silent; then
              echo "MySQL is healthy"
              exit 0
            fi
            echo "Waiting for MySQL... attempt $i/30"
            sleep 2
          done
          echo "MySQL did not become healthy in time"
          exit 1

      - name: Import Sakila schema and data
        run: |
          mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DB" < sakila-db/sakila-schema.sql
          mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DB" < sakila-db/sakila-data.sql

      - name: Run pytest
        run: pytest -v

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Verify image exists
        run: docker images ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test container on port 5000
        run: |
          docker run -d --name sakila-smoke -p 5000:5000 ${{ env.IMAGE_NAME }}:${{ github.sha }}
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/ > /dev/null; then
              echo "Smoke test passed"
              docker logs sakila-smoke
              docker rm -f sakila-smoke
              exit 0
            fi
            sleep 2
          done
          echo "Smoke test failed"
          docker logs sakila-smoke || true
          docker rm -f sakila-smoke || true
          exit 1

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: json
          output: trivy-report.json
          exit-code: "0"
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
