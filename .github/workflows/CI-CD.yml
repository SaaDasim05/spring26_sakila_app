name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:

  # ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install flake8

      - run: flake8 . --max-line-length=120 --ignore=E501,W503

  # ---------------- TEST (WITH MYSQL) ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: sakila

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -r requirements.txt pytest pymysql

      - name: Wait for MySQL
        run: sleep 20

      - name: Import Sakila DB
        run: |
          mysql -h 127.0.0.1 -u root -proot sakila < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -u root -proot sakila < sakila-db/sakila-data.sql

      - run: pytest -v

  # ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: docker build -t sakila-app:${{ github.sha }} .

      - run: docker images

      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 sakila-app:${{ github.sha }}
          sleep 5
          curl http://localhost:5000

  # ---------------- SECURITY SCAN ----------------
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: sakila-app:${{ github.sha }}
          format: json
          output: trivy-report.json
          exit-code: 0

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json