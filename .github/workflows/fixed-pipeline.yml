name: Fixed CI Pipeline
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest # Fix 1
    steps:
      - name: Checkout code # Fix 2
        uses: actions/checkout@v4
      
      - name: Setup Python # Fix 3
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
          
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run Tests
        run: pytest tests/ -v

  build: # Fix 4
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build Image
        run: docker build -t myapp . # Fix 5

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Deploying..."