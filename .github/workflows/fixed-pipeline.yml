name: Fixed CI Pipeline
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest # Fix 1: Corrected runner label 
    steps:
      - name: Checkout code # Fix 2: Added list dash
        uses: actions/checkout@v4
      
      - name: Setup Python # Fix 3: Separated into clean step
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install dependencies # Moved up: Must install before running
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run Tests
        run: python -m pytest tests/ -v # Now it will find the pytest module

  build: # Fix 4: Added unique Job ID 
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build Image
        run: docker build -t myapp . # Fix 5: Corrected docker flags/context 

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Deploying..."
