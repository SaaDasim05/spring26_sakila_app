name: Deployment Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:

  # ---------------- STAGING ----------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull Docker Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/sakila-app:latest || true

      - name: Run container (staging)
        run: |
          docker run -d -p 5001:5000 --name sakila-staging ${{ secrets.DOCKER_USERNAME }}/sakila-app:latest || true

      - name: Print environment variables
        run: |
          echo "ENVIRONMENT=staging"
          echo "PORT=5001"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "- Port: 5001" >> $GITHUB_STEP_SUMMARY
          echo "- Status: SUCCESS" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: |
          echo "Slack notification: Deployment to staging successful"

  # ---------------- PRODUCTION ------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # 👈 THIS ENABLES MANUAL APPROVAL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Production Deployment
        run: |
          echo "Deploying to PRODUCTION..."
          echo "App running on port 5000"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: Production deployment successful
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification
        run: |
          echo "Slack notification: Deployment to production successful"