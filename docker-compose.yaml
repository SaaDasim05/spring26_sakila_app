version: '3.9'

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - sakila-network

  db-admin:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - sakila-network

networks:
  sakila-network:

volumes:
  sakila-db-data: